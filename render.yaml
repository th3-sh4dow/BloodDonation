services:
  # ── Single Web Service: Django serves API + Frontend ──
  - type: web
    name: blooddrop
    runtime: python
    rootDir: server
    buildCommand: "./build.sh"
    startCommand: "gunicorn bloodbank.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: blooddrop
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: blooddrop-db
          property: connectionString

databases:
  - name: blooddrop-db
    databaseName: blooddrop
    user: blooddrop_user
    plan: free
