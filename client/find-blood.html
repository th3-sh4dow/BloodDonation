<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Blood Donors — BloodDrop</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🫀</div>
                <span>BloodDrop</span>
            </a>
            <button class="nav-toggle"><span></span><span></span><span></span></button>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="find-blood.html" class="active">Find Blood</a>
                <a href="request-blood.html">Request Blood</a>
            </div>
            <div class="nav-auth"></div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Find Blood Donors</h1>
            <p>Search for available donors near you by blood group and city.</p>
        </div>
    </div>

    <section class="section" style="padding-top: 0;">
        <div class="container">
            <!-- Search Bar -->
            <form id="searchForm" class="search-bar" style="transform: translateY(-50%); margin-bottom: 0;">
                <select id="bloodGroup" class="form-select">
                    <option value="">All Blood Groups</option>
                    <option value="A+">A+</option><option value="A-">A-</option>
                    <option value="B+">B+</option><option value="B-">B-</option>
                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                    <option value="O+">O+</option><option value="O-">O-</option>
                </select>
                <input type="text" id="city" class="form-input" placeholder="Enter city (e.g., Mumbai)">
                <button type="submit" class="btn btn-primary" style="flex: 0 0 auto;">Search Donors</button>
            </form>

            <div id="resultsInfo" style="margin-bottom: 24px; font-weight: 500;"></div>

            <div id="donorsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">
                <!-- Loading State -->
                <div class="skeleton" style="height: 140px; border-radius: var(--radius-lg);"></div>
                <div class="skeleton" style="height: 140px; border-radius: var(--radius-lg);"></div>
                <div class="skeleton" style="height: 140px; border-radius: var(--radius-lg);"></div>
            </div>
            
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">🔍</div>
                <h3>No donors found</h3>
                <p>Try adjusting your search criteria or submit a blood request instead.</p>
                <a href="request-blood.html" class="btn btn-primary mt-4" style="margin-top: 16px;">Create Request</a>
            </div>
        </div>
    </section>

    <!-- Contact Modal -->
    <div class="modal-overlay" id="contactModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Donor Contact Details</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Injected via JS -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/find-blood.js"></script>
</body>
</html>
