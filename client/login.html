<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BloodDrop</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🫀</div>
                <span>BloodDrop</span>
            </a>
            <div class="nav-links hide-mobile">
                <a href="index.html">Home</a>
                <a href="find-blood.html">Find Blood</a>
            </div>
            <div class="nav-auth">
                <a href="register.html" class="btn btn-sm btn-primary">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="card auth-card animate-in">
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your account</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username or Email</label>
                    <input type="text" id="username" class="form-input" required placeholder="Enter username or email">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" required placeholder="Enter password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px;">Sign In</button>
            </form>
            
            <div class="auth-divider">OR</div>
            
            <div style="text-align:center;font-size:0.9rem;">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                await API.login(data);
                showToast('Login successful', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (err) {
                showToast(err.data?.error || 'Invalid credentials', 'error');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
